<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackpeak Ventures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: #000000;
      color: #ffffff;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      overflow: hidden;
    }

    .logo {
      width: 220px;
      max-width: 55vw;
      max-height: 20vh;
      object-fit: contain;
      filter: invert(1);
      margin-bottom: 2.5rem;
      animation: revealDown 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      max-width: 380px;
      animation: revealUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.4rem;
      border: 1px solid #ffffff;
      border-radius: 6px;
      text-decoration: none;
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: transparent;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      white-space: nowrap;
    }
    
    .link-btn:hover {
      background: #ffffff;
      color: #000000;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
    }
    
    .link-btn svg { 
      opacity: 0.8; 
      flex-shrink: 0; 
      transition: transform 0.3s ease;
    }
    
    .link-btn:hover svg {
      transform: translateX(3px) translateY(-3px);
      opacity: 1;
    }

    .divider {
      width: 100%;
      max-width: 380px;
      height: 1px;
      background: #ffffff;
      opacity: 0.2;
      margin: 1.5rem 0;
      animation: revealUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
    }

    .socials {
      display: flex;
      gap: 1.25rem;
      animation: revealUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
    }

    .social-btn {
      width: 46px;
      height: 46px;
      border: 1px solid #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    .social-btn:hover {
      background: #ffffff;
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
    }
    
    .social-btn svg { 
      width: 18px; 
      height: 18px; 
      fill: #ffffff; 
      transition: fill 0.3s ease;
    }
    
    .social-btn:hover svg { 
      fill: #000000; 
    }

    footer {
      margin-top: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ffffff;
      opacity: 0.4;
      animation: revealUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
    }

    /* Shrink on short screens */
    @media (max-height: 600px) {
      .logo { max-height: 14vh; margin-bottom: 1.25rem; }
      .link-btn { padding: 0.7rem 1.2rem; font-size: 0.85rem; }
      .links { gap: 0.6rem; }
      .divider { margin: 1rem 0; }
      .social-btn { width: 38px; height: 38px; }
      .social-btn svg { width: 14px; height: 14px; }
      footer { margin-top: 1rem; }
    }

    /* Modern Animations */
    @keyframes revealDown {
      0% { opacity: 0; transform: translateY(-20px) scale(0.98); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    
    @keyframes revealUp {
      0% { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
