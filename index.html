<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackpeak Ventures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0ee;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
    }

    .logo {
      width: 220px;
      filter: invert(1);
      margin-bottom: 2.5rem;
      animation: fadeDown 0.7s ease both;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 380px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.4rem;
      border: 1px solid rgba(240,240,238,0.15);
      border-radius: 6px;
      text-decoration: none;
      color: #f0f0ee;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      background: transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .link-btn:hover {
      background: rgba(240,240,238,0.07);
      border-color: rgba(240,240,238,0.35);
    }
    .link-btn svg {
      opacity: 0.4;
      flex-shrink: 0;
    }

    .divider {
      width: 100%;
      max-width: 380px;
      height: 1px;
      background: rgba(240,240,238,0.1);
      margin: 1.5rem 0;
      animation: fadeUp 0.7s 0.25s ease both;
    }

    .socials {
      display: flex;
      gap: 1rem;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(240,240,238,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .social-btn:hover {
      background: rgba(240,240,238,0.08);
      border-color: rgba(240,240,238,0.4);
    }
    .social-btn svg {
      width: 16px;
      height: 16px;
      fill: #f0f0ee;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(240,240,238,0.25);
      animation: fadeUp 0.7s 0.4s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="Blackpeak Ventures" class="logo"/>

      </svg>

        <path d="M1 11L11 1M11 1H3M11 1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
