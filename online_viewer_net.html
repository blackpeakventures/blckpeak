<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Black Peak Ventures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background-color: #000000; /* Pure Black */
      color: #ffffff; /* Pure White */
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      cursor: auto; /* Standard mouse */
    }

    /* ── Ambient Interactive Canvas Layers ── */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    #noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── Cinematic Preloader Overlay ── */
    #intro {
      position: fixed;
      inset: 0;
      background: #000000;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: introWipe 1.2s cubic-bezier(0.76, 0, 0.24, 1) 1s forwards;
      pointer-events: none;
    }
    #intro-logo {
      width: 200px;
      /* If your logo is naturally black, keep invert(1). If it's white, delete filter: invert(1); */
      filter: invert(1);
      animation: introLogoFade 0.5s ease 0.6s forwards;
    }
    @keyframes introWipe {
      0%   { clip-path: inset(0 0 0 0); }
      100% { clip-path: inset(0 0 100% 0); }
    }
    @keyframes introLogoFade { to { opacity: 0; transform: scale(0.95); } }

    /* ── Main Layout ── */
    #page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 2rem 1.25rem;
      opacity: 0;
      animation: pageFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
    }
    @keyframes pageFadeIn {
      to { opacity: 1; }
    }

    .logo {
      width: 240px;
      max-width: 60vw;
      max-height: 20vh;
      object-fit: contain;
      filter: invert(1);
      margin-bottom: 3rem;
    }

    /* ── High Contrast Links ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.6rem;
      border: 1px solid #ffffff; /* Stark White Border */
      border-radius: 4px;
      text-decoration: none;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: transparent;
      overflow: hidden;
      transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s;
    }

    /* Sweep Fill Animation */
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #ffffff;
      transform: translateX(-101%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 0;
    }
    .link-btn:hover::before { transform: translateX(0); }
    .link-btn:hover { color: #000000; transform: translateY(-3px); }

    .link-btn span, .link-btn svg { position: relative; z-index: 1; }
    .link-btn svg { 
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
    }
    .link-btn:hover svg { transform: translate(4px, -4px); }

    /* ── Stark Divider ── */
    .divider {
      width: 100%;
      max-width: 400px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      margin: 2rem 0;
      position: relative;
    }
    .divider-pulse {
      position: absolute;
      top: 0; left: -100px;
      width: 100px; height: 1px;
      background: #ffffff;
      animation: pulseLine 4s infinite;
      box-shadow: 0 0 10px #ffffff;
    }
    @keyframes pulseLine {
      0% { left: -100px; opacity: 0; }
      50% { opacity: 1; }
      100% { left: 100%; opacity: 0; }
    }

    /* ── Socials ── */
    .socials {
      display: flex;
      gap: 1.5rem;
    }

    .social-btn {
      position: relative;
      width: 50px;
      height: 50px;
      border: 1px solid #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #ffffff;
      background: transparent;
      overflow: hidden;
      transition: color 0.4s, transform 0.4s;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #ffffff;
      transform: translateY(101%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 0;
      border-radius: 50%;
    }
    .social-btn:hover::before { transform: translateY(0); }
    .social-btn:hover { color: #000000; transform: translateY(-4px); }

    .social-btn svg { 
      width: 20px; 
      height: 20px; 
      fill: currentColor; 
      position: relative; 
      z-index: 1; 
    }

    footer {
      margin-top: 3rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    @media (max-height: 600px) {
      .logo { max-height: 14vh; margin-bottom: 1.5rem; }
      .link-btn { padding: 0.8rem 1.2rem; font-size: 0.85rem; }
      .social-btn { width: 40px; height: 40px; }
      .social-btn svg { width: 16px; height: 16px; }
    }
  </style>
</head>
<body>

    <footer>© 2026 Black Peak Ventures</footer>

  <script>
    // ── Interactive Generative Background Physics ──
    const canvas = document.getElementById('canvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize(); 
      window.addEventListener('resize', resize);

      // Subtle mouse tracking for particle repulsion
      let mx = W/2, my = H/2;
      document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

      const particles = Array.from({ length: 70 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -Math.random() * 0.4 - 0.1,
        opacity: Math.random() * 0.5 + 0.1,
        size: Math.random() * 1.5 + 0.5
      }));

      let t = 0;
      function draw() {
        ctx.clearRect(0, 0, W, H);
        t += 0.005;
        
        const cx = W / 2, cy = H * 0.44;
        
        // Render geometric expanding mountain/peak vectors
        for (let i = 1; i <= 6; i++) {
          const s = i * 0.15, alpha = 0.03 + 0.015 * Math.sin(t + i * 0.5);
          ctx.beginPath();
          ctx.moveTo(cx - W * 0.45 * s, cy + H * 0.35 * s);
          ctx.lineTo(cx, cy - H * 0.45 * s);
          ctx.lineTo(cx + W * 0.45 * s, cy + H * 0.35 * s);
          ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        // Particle fluid dynamics
        particles.forEach(p => {
          // Mouse repulsion physics
          let dx = mx - p.x;
          let dy = my - p.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < 100) {
            p.x -= (dx/dist) * 0.5;
            p.y -= (dy/dist) * 0.5;
          }

          p.x += p.vx; 
          p.y += p.vy;
          if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
          if (p.x < -10) p.x = W + 10;
          if (p.x > W + 10) p.x = -10;
          
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    }
  </script>
